<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studi Kasus DOM Events</title>
    <style>
        body {  display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        .form-card {  max-width: 400px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #1e293b; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #2563eb; outline: none; }
        
        /* Pesan Validasi Mentok */
        .pesan-error { color: #ef4444; font-size: 0.85rem; margin-top: 5px; display: none; }
        
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .notif-sukses { background-color: #dbeafe; color: #1e40af; padding: 15px; border-radius: 6px; margin-top: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Pendaftaran Mentor</h2>
        
        <form id="form-pendaftaran">
            <div class="input-group">
                <label for="input-nama">Nama Lengkap</label>
                <input type="text" id="input-nama" placeholder="Contoh: Rian Hidayat" required>
            </div>

            <div class="input-group">
                <label for="input-nim">NIM (Minimal 6 Angka)</label>
                <input type="number" id="input-nim" placeholder="Contoh: 240101" required>
                <p id="error-nim" class="pesan-error">NIM harus minimal 6 karakter, Bang!</p>
            </div>

            <button type="submit" id="btn-submit" disabled>Daftar Mentor</button>
        </form>

        <div id="notif" class="notif-sukses"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
