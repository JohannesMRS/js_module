<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Mandiri Event Delegation</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #0f172a; color: white; }
        .box { max-width: 400px; background-color: #1e293b; padding: 20px; border-radius: 12px; }
        h3 { margin-top: 0; color: #38bdf8; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #334155; }
        .grup-tombol { display: flex; align-items: center; gap: 10px; }
        button { background-color: #38bdf8; border: none; padding: 5px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .angka-jumlah { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🛒 Quick-Add Menu OXA</h3>
        
        <div id="menu-kopi">
            
            <div class="item">
                <span>Aren Latte</span>
                <div class="grup-tombol">
                    <button class="btn-aksi" data-aksi="kurang">-</button>
                    <span class="angka-jumlah">0</span>
                    <button class="btn-aksi" data-aksi="tambah">+</button>
                </div>
            </div>

            <div class="item">
                <span>Avocado Coffee</span>
                <div class="grup-tombol">
                    <button class="btn-aksi" data-aksi="kurang">-</button>
                    <span class="angka-jumlah">0</span>
                    <button class="btn-aksi" data-aksi="tambah">+</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
